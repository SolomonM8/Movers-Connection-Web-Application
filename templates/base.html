<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Movers Connection{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; color: #222; }
    nav { background: #1f2a44; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: #fff; text-decoration: none; margin-right: 1rem; }
    nav a:hover { text-decoration: underline; }
    nav form { display: inline; }
    nav button { background: none; border: 1px solid #fff; color: #fff; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; }
    main { max-width: 700px; margin: 2rem auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .errorlist { color: #b00020; }
    ul.messages { list-style: none; padding: 0; }
    ul.messages li { padding: 0.5rem; background: #e6f4ea; border-radius: 4px; margin-bottom: 0.5rem; }
    label { display: block; margin-top: 0.75rem; font-weight: bold; }
    input, select { width: 100%; padding: 0.4rem; margin-top: 0.25rem; box-sizing: border-box; }
    button[type="submit"] { margin-top: 1.25rem; padding: 0.5rem 1.25rem; background: #1f2a44; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <nav>
    <div>
      <a href="{% url 'accounts:dashboard' %}">Movers Connection</a>
    </div>
    <div>
      {% if user.is_authenticated %}
        <span>{{ user.username }} &middot; {{ user.get_role_display }}</span>
        <form action="{% url 'accounts:logout' %}" method="post">
          {% csrf_token %}
          <button type="submit">Log out</button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}">Log in</a>
        <a href="{% url 'accounts:register' %}">Register</a>
      {% endif %}
    </div>
  </nav>
  <main>
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}<li>{{ message }}</li>{% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
