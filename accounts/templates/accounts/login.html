{% extends "base.html" %}
{% block title %}Log In - Movers Connection{% endblock %}
{% block content %}
<h1>Log In</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Log In</button>
</form>
<p class="helper-link">Don't have an account? <a href="{% url 'accounts:register' %}">Register here</a>.</p>
{% endblock %}
